<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ayesha</title>
    <link href="https://fonts.googleapis.com/css2?family=Galada&family=Hind+Siliguri:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Hind Siliguri', sans-serif; background: #fce4ec; overflow-x: hidden; text-align: center; }
        #slides-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; }
        .slide { display: none; width: 90%; max-width: 500px; padding: 25px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); animation: fadeIn 0.5s ease; position: relative; z-index: 5; }
        .slide.active { display: block; }
        h1 { font-family: 'Dancing Script', cursive; color: #d81b60; font-size: 2.2rem; margin: 0; }
        .birth-date { font-family: 'Galada', cursive; color: #ff4081; font-size: 1.5rem; }
        button { background: #ff4081; color: white; border: none; padding: 12px 20px; border-radius: 30px; cursor: pointer; margin-top: 20px; font-family: 'Hind Siliguri', sans-serif; font-weight: bold; }
        
        /* বেলুন গেমের মেইন এরিয়া */
        #balloon-game-area { position: relative; width: 100%; height: 350px; background: #fff5f8; border-radius: 15px; border: 2px dashed #ffc1e3; margin: 15px 0; overflow: hidden; }
        .balloon { position: absolute; width: 60px; cursor: pointer; transition: transform 0.1s; z-index: 10; }
        
        /* বেলুন ফাটলে যে লেখা উঠবে তার স্টাইল */
        .pop-msg { position: absolute; color: #d81b60; font-weight: bold; font-size: 1.1rem; pointer-events: none; z-index: 20; animation: moveUp 1s ease-out forwards; white-space: nowrap; }
        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="slides-container">
    <section class="slide active" id="slide1">
        <h1>Happy Birthday Dear Ayesha</h1>
        <div class="birth-date">১৩ অক্টোবর</div>
        <button onclick="nextSlide()">একটি উইশ করো ✨</button>
    </section>

    <section class="slide" id="slide2">
        <h2 style="color: #d81b60;">মোমবাতি নেভাও! 🕯️</h2>
        <img src="https://media0.giphy.com/media/v1.Y2lkPTZjMDliOTUyc2NpYm9jMHljdWF1bGNocXRrajlndHEyaG41eXd4NnhubWJhdTJocSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/TCatn41OHqDaSdIFlM/giphy.gif" alt="Cake" id="cake" style="width:180px; cursor:pointer;">
        <audio id="birthdaySong" src="Ronii.mp3" preload="auto"></audio>
        <br><button onclick="nextSlide()">উপহার খোলো 🎁</button>
    </section>

    <section class="slide" id="slide3">
        <h2 style="color: #d81b60;">গিফটে ক্লিক করো!</h2>
        <img src="https://i.postimg.cc/FsyY2yWw/IMG-20251009-120746421-HDR.jpg" alt="Gift" id="giftImg" style="width:150px; cursor:pointer; border-radius: 10px;">
        <img src="https://i.ibb.co/1vLgWgP/tulip.png" alt="Tulip" id="tulipImg" style="display:none; width:120px; margin: 10px auto;">
        <br><button onclick="nextSlide()">গেম খেলো 🎈</button>
    </section>

    <section class="slide" id="slide4">
        <h2 style="color: #d81b60;">বেলুনগুলো ফাটিয়ে দাও!</h2>
        <div id="balloon-game-area"></div>
        <button onclick="nextSlide()">শেষ চমক ✨</button>
    </section>

    <section class="slide" id="slide5">
        <div style="font-weight:bold; color:#c2185b;">শুভ জন্মদিন প্রিয়, আল্লাহ তোমায় সবসময় ভালো রাখুক 💖</div>
        <textarea id="wishText" style="width:90%; height:70px; margin-top:10px; border-radius:10px; border:1px solid #ffc1e3;" placeholder="কিছু লিখো..."></textarea>
        <br><button onclick="addWish()">পাঠিয়ে দাও 🎁</button>
        <ul id="wishList" style="list-style: none; padding: 0; color: #d81b60;"></ul>
    </section>
</div>

<script>
    let currentSlide = 1;
    function nextSlide() {
        document.getElementById('slide' + currentSlide).classList.remove('active');
        currentSlide++;
        const next = document.getElementById('slide' + currentSlide);
        if (next) next.classList.add('active');
        if (currentSlide === 2) document.getElementById('birthdaySong').play();
        if (currentSlide === 4) setupBalloonGame();
    }

    document.getElementById('giftImg').addEventListener('click', function() {
        this.style.display = 'none';
        document.getElementById('tulipImg').style.display = 'block';
    });

    function setupBalloonGame() {
        const area = document.getElementById('balloon-game-area');
        area.innerHTML = '';
        const messages = ["I Love You! ❤️", "শুভ জন্মদিন! 🎂", "Ayesha ✨", "Aysha+Roni", "প্রিয়তমা 💍", "হাসিখুশি থেকো 😊", "আমার কলিজা 💖", "দোয়া রইলো 🤲"];

        for (let i = 0; i < 10; i++) {
            const b = document.createElement('img');
            b.src = "https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUydmx5dDF6eHhvdW9hYXY5ODdnYzl5MGxyaDJ0ZmFxeGxzN21mdGcyayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/vN2VlOnSeLd6UJsdRx/giphy.gif";
            b.className = 'balloon';
            
            // বেলুনগুলো কন্টেইনারের ভেতর রেন্ডমলি ছড়িয়ে দেওয়া
            const x = Math.random() * (area.clientWidth - 60);
            const y = Math.random() * (area.clientHeight - 80);
            
            b.style.left = x + 'px';
            b.style.top = y + 'px';
            area.appendChild(b);

            b.addEventListener('click', function(e) {
                // বেলুন ফাটানোর পজিশন সেভ করা
                const rect = area.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;

                this.remove(); // বেলুন মুছে ফেলা

                // মেসেজ তৈরি করা
                const msg = document.createElement('div');
                msg.className = 'pop-msg';
                msg.textContent = messages[Math.floor(Math.random() * messages.length)];
                
                // লেখাটি ঠিক যেখানে ক্লিক করা হয়েছে সেখানে বসানো
                msg.style.left = (clickX - 30) + 'px';
                msg.style.top = (clickY - 20) + 'px';
                
                area.appendChild(msg);
                setTimeout(() => msg.remove(), 1000);
            });
        }
    }

    function addWish() {
        const text = document.getElementById('wishText').value;
        if (!text.trim()) return;
        const li = document.createElement('li');
        li.textContent = "💖 " + text;
        document.getElementById('wishList').appendChild(li);
        document.getElementById('wishText').value = "";
    }
</script>
</body>
</html>
